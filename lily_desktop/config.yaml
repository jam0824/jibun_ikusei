openai:
  chat_model: gpt-5.4
  image_model: gpt-image-1.5
  screen_analysis_model: gpt-5
chat:
  auto_talk_interval_minutes: 15
  auto_talk_min_turns: 3        # 掛け合いの最小ターン数
  auto_talk_max_turns: 5        # 掛け合いの最大ターン数
  follow_up_min_extra: 1        # ユーザー発言後の追加往復 最小
  follow_up_max_extra: 3        # ユーザー発言後の追加往復 最大
display:
  lily_scale: 0.3
  haruka_scale: 0.65
  window_x: -1927
  window_y: 2515
voice:
  enabled: true
  device_name: マイク (Yeti Nano)
  vad_aggressiveness: 3
  vad_start_frames: 8      # 発話開始判定に必要な連続音声フレーム数（大きい=誤検知しにくい）
  vad_end_frames: 30        # 発話終了判定の連続無音フレーム数（大きい=間を許容）
  max_speech_seconds: 8      # 最大発話時間（秒）— これを超えると認識を打ち切る
  volume_threshold: 500     # 音量閾値(RMS) — これ以下の音量は無視（スピーカー音除去用）
  use_wake_words: false      # ウェイクワードを使うか（falseなら全音声に応答）
  wake_words:                # この中のいずれかが含まれている時だけ応答する
    - リリィ
    - リリー
  wake_word_aliases:         # リリィに変換する誤認識パターン
    - DD
    - ギリー
  speaker_verification_enabled: true  # 話者照合を使うか（enroll_speaker.py でプロファイルを作成してから有効化）
  speaker_profile_path: speaker_profile.pt  # 話者プロファイルのパス
  speaker_verification_threshold: 0.35  # 照合閾値（コサイン類似度、0〜1）
tts:
  enabled: true
  voicevox_url: http://localhost:50021
  lily_engine: voicevox              # voicevox or gemini
  lily_speaker_id: 20              # VOICEVOX用
  lily_gemini_voice: Zephyr        # Gemini TTS用
  haruka_engine: voicevox            # voicevox or gemini
  haruka_speaker_id: 8             # VOICEVOX用
  haruka_gemini_voice: Kore        # Gemini TTS用
  gemini_model: gemini-2.5-flash-preview-tts