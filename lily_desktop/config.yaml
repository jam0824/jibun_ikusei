openai:
  chat_model: gpt-5.4
  image_model: gpt-image-1.5
desktop:
  analysis_provider: ollama
  analysis_base_url: http://127.0.0.1:11434
  analysis_model: gemma4:e4b
chat:
  auto_talk_interval_minutes: 15
  auto_talk_min_turns: 3
  auto_talk_max_turns: 5
  follow_up_min_extra: 1
  follow_up_max_extra: 3
  auto_talk_skip_audible_domains:
    - youtube.com
    - netflix.com
    - primevideo.com
display:
  lily_scale: 0.3
  haruka_scale: 0.65
  user_balloon_display_seconds: 15.0
  window_x: -1927
  window_y: 2515
voice:
  enabled: true
  pause_during_tts: false
  device_name: マイク (Yeti Nano)
  vad_aggressiveness: 3
  vad_start_frames: 8
  vad_end_frames: 30
  max_speech_seconds: 8
  volume_threshold_enabled: false
  volume_threshold: 500
  use_wake_words: false
  wake_words:
    - リリィ
    - リリー
  wake_word_aliases:
    - DD
    - D D
    - ギリー
    - 3 D
  ignore_words:
    - alexa
    - Alexa
    - アレクサ
    - アレックス
    - RX
    - rx
  speaker_verification_enabled: true
  speaker_profile_path: speaker_profile.pt
  speaker_verification_threshold: 0.36
camera:
  enabled: true
  device_name: USB 2.0 Camera
  interval_seconds: 300
  analysis_provider: ollama
  analysis_base_url: http://127.0.0.1:11434
  analysis_model: gemma4:e4b
  summary_provider: ollama
  summary_base_url: http://127.0.0.1:11434
  summary_model: gemma4:e4b
  summary_interval_seconds: 1800
talk_seeds:
  interest_topics:
    - 哲学
    - オカルト
    - 神話
  memory_directory: 'D:\codes\mixi2-api\generated_text'
tts:
  enabled: true
  voicevox_url: http://localhost:50021
  lily_engine: voicevox
  lily_speaker_id: 20
  lily_gemini_voice: Zephyr
  haruka_engine: voicevox
  haruka_speaker_id: 3
  haruka_gemini_voice: Achernar
  gemini_model: gemini-2.5-flash-preview-tts
healthplanet:
  sync_interval_minutes: 15
fitbit:
  enabled: true
  config_file: fitbit_config.json
http_bridge:
  enabled: true
  port: 18765
youtube_transcript:
  output_directory: ../output/youtube_transcripts
